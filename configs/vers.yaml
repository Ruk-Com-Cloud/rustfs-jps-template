# RustFS version pins + tested-tag allowlist (single source of version truth)
# Bump here only. master = dev; releases are Git tags vX.Y.Z; marketplace points at a tag.
# A tag enters `allowlist` ONLY after CI (s3-tests + E2E SigV4/multipart/presigned via LB)
# passes against it (PRD FR-5.1 / FR-9.3 / OQ-6). NEVER use `latest` on the production path.
#
# Source: research doc §Technology Stack / §Implementation — RustFS is pre-1.0 BETA,
# no on-disk-format-stability/LTS policy. Treat every bump as breaking until proven.

globals:
  # Default tag offered for NEW installs (must be a member of `allowlist`).
  rustfs_default_tag: "1.0.0-beta.3"

  # Image repo (Docker Hub official). Pin by tag here; consider digest pinning for prod
  # per org guardrails once a tag is validated.
  rustfs_image_repo: "rustfs/rustfs"

  # Tested-tag allowlist surfaced in the "Change Version" picker (addons/change-version.jps).
  # Order = newest first. Each entry MUST have passed CI before being added.
  # [VERIFY] pass-rate baseline / acceptance criteria per OQ-6 before first real release.
  rustfs_allowlist:
    - tag: "1.0.0-beta.3"
      released: "2026-05-14"
      status: "tested"          # tested | candidate | blocked
      notes: "Initial baseline. Beta — see research §RustFS caveats."
    # - tag: "1.0.0"            # add on GA (~Jul 2026 target) AFTER CI passes; re-evaluate
    #   released: ""
    #   status: "candidate"
    #   notes: "RustFS 1.0 GA — revisit format-stability/LTS policy (PRD NFR-5)."
