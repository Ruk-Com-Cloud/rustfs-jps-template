# RustFS version pins (single source of version truth).
# Bump here only. main = dev; releases are Git tags vX.Y.Z; marketplace points
# at a tag. A tag may be used ONLY after CI (s3-tests + E2E SigV4/multipart/
# presigned via LB) passes (PRD FR-5.1 / FR-9.3 / OQ-6). NEVER `latest` in prod.
#
# RustFS is pre-1.0 BETA, no on-disk-format/LTS policy — treat every bump as
# breaking until proven.
#
# IMPORTANT: this file is loaded via `mixins:` and its `globals:` are merged
# into the manifest globals. JPS globals MUST be SCALARS only — a nested
# list/object here (e.g. an allowlist array) breaks manifest processing and
# leaks into settings. So the tested-tag allowlist is kept as DOCUMENTATION
# (comments) here; the user-facing picker lives in addons/change-version.jps.
#
# Tested-tag allowlist (process doc — keep in sync with change-version.jps):
#   - 1.0.0-beta.3  released 2026-05-14  status: tested
#       Initial baseline. Beta — see research §RustFS caveats.
#   - 1.0.0         (add on GA ~Jul 2026, AFTER CI passes; revisit LTS policy)

globals:
  rustfs_default_tag: "1.0.0-beta.3"
  rustfs_image_repo: "rustfs/rustfs"
